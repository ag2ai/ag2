<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 415" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a73e8"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#34a853"/>
    </marker>
    <marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="415" fill="#f8f9fa" rx="10"/>

  <!-- ===== ROW 1: Research Phase ===== -->

  <!-- Chief Editor -->
  <rect x="70" y="60" width="120" height="56" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="130" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#1a73e8">Chief Editor</text>
  <text x="130" y="101" text-anchor="middle" font-size="10" fill="#555">init_research</text>

  <!-- Editor -->
  <rect x="230" y="60" width="120" height="56" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="290" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#1a73e8">Editor</text>
  <text x="290" y="101" text-anchor="middle" font-size="10" fill="#555">plan_sections</text>

  <!-- Researcher -->
  <rect x="390" y="60" width="120" height="56" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="450" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#1a73e8">Researcher</text>
  <text x="450" y="101" text-anchor="middle" font-size="10" fill="#555">do_research</text>

  <!-- Reviewer -->
  <rect x="550" y="60" width="120" height="56" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="610" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#1a73e8">Reviewer</text>
  <text x="610" y="101" text-anchor="middle" font-size="10" fill="#555">evaluate_research</text>

  <!-- Revisor -->
  <rect x="710" y="60" width="120" height="56" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="770" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#1a73e8">Revisor</text>
  <text x="770" y="101" text-anchor="middle" font-size="10" fill="#555">do_revision</text>

  <!-- Row 1 arrows -->
  <line x1="191" y1="88" x2="228" y2="88" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="351" y1="88" x2="388" y2="88" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="511" y1="88" x2="548" y2="88" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="671" y1="88" x2="708" y2="88" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- GPT Researcher badges: Researcher and Revisor -->
  <rect x="397" y="119" width="106" height="14" rx="3" fill="#fff7ed" stroke="#f59e0b" stroke-width="0.75"/>
  <text x="450" y="129" text-anchor="middle" font-size="9" fill="#c2410c">GPT Researcher</text>

  <rect x="717" y="119" width="106" height="14" rx="3" fill="#fff7ed" stroke="#f59e0b" stroke-width="0.75"/>
  <text x="770" y="129" text-anchor="middle" font-size="9" fill="#c2410c">GPT Researcher</text>

  <!-- Down arrow: Revisor → Human Review -->
  <line x1="770" y1="135" x2="770" y2="228" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- ===== ROW 2: Human Review + Write Phase ===== -->

  <!-- Human Review -->
  <rect x="710" y="230" width="120" height="56" rx="8" fill="#fffbea" stroke="#f59e0b" stroke-width="2"/>
  <text x="770" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Human Review</text>
  <text x="770" y="271" text-anchor="middle" font-size="10" fill="#555">present_for_review</text>

  <!-- Writer -->
  <rect x="550" y="230" width="120" height="56" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="610" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="#34a853">Writer</text>
  <text x="610" y="271" text-anchor="middle" font-size="10" fill="#555">do_write_report</text>

  <!-- Publisher -->
  <rect x="390" y="230" width="120" height="56" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="450" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="#34a853">Publisher</text>
  <text x="450" y="271" text-anchor="middle" font-size="10" fill="#555">do_publish</text>

  <!-- GPT Researcher badge: Writer -->
  <rect x="557" y="289" width="106" height="14" rx="3" fill="#fff7ed" stroke="#f59e0b" stroke-width="0.75"/>
  <text x="610" y="299" text-anchor="middle" font-size="9" fill="#c2410c">GPT Researcher</text>

  <!-- Approved label + Human Review → Writer arrow -->
  <text x="690" y="248" text-anchor="middle" font-size="9" fill="#34a853">approved</text>
  <line x1="709" y1="257" x2="672" y2="257" stroke="#34a853" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Writer → Publisher arrow -->
  <line x1="549" y1="257" x2="512" y2="257" stroke="#34a853" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- ===== HITL Feedback Loop ===== -->
  <path d="M770,286 L770,355 L450,355 L450,62"
        stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4" fill="none"
        marker-end="url(#ao)"/>
  <rect x="527" y="346" width="146" height="17" rx="4" fill="#fffbea"/>
  <text x="600" y="358" text-anchor="middle" font-size="10" fill="#92400e">needs more research</text>

  <!-- ===== LEGEND ===== -->
  <rect x="70" y="389" width="11" height="11" rx="2" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1"/>
  <text x="87" y="399" font-size="10" fill="#555">Research agents</text>

  <rect x="230" y="389" width="11" height="11" rx="2" fill="#fffbea" stroke="#f59e0b" stroke-width="1.25"/>
  <text x="247" y="399" font-size="10" fill="#555">Human review</text>

  <rect x="390" y="389" width="11" height="11" rx="2" fill="#e6f4ea" stroke="#34a853" stroke-width="1"/>
  <text x="407" y="399" font-size="10" fill="#555">Write agents</text>

  <rect x="543" y="390" width="72" height="11" rx="3" fill="#fff7ed" stroke="#f59e0b" stroke-width="0.75"/>
  <text x="579" y="399" text-anchor="middle" font-size="9" fill="#c2410c">GPT Researcher</text>
  <text x="621" y="399" font-size="10" fill="#555"> uses GPT Researcher</text>
</svg>
