name: Claude Code Review

# NOTE: this workflow uses `pull_request_target` so secrets (including
# ``CLAUDE_CODE_OAUTH_TOKEN`` and the optional ``CLAUDE_REVIEW_PAT``) are
# available for PRs opened from forks. To prevent code from a fork from
# running with those secrets, fork PRs are only reviewed when a
# maintainer has applied the ``safe-to-review`` label.

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - ready_for_review
      - labeled
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

jobs:
  claude-review:
    if: |
      github.actor != 'dependabot[bot]' &&
      ((github.event_name == 'pull_request_target' && github.event.pull_request.draft == false) ||
      github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Resolve PR number and fork status
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          PR_NUMBER_EVENT: ${{ github.event.pull_request.number }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
          else
            PR_NUMBER="$PR_NUMBER_EVENT"
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          PR_INFO=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPO" \
            --json isCrossRepository,headRepositoryOwner,headRefOid,labels \
            2>/dev/null || echo '{}')
          IS_FORK=$(echo "$PR_INFO" | jq -r '.isCrossRepository // false')
          HEAD_SHA=$(echo "$PR_INFO" | jq -r '.headRefOid // ""')
          HAS_SAFE_LABEL=$(echo "$PR_INFO" | jq -r '[.labels[].name] | index("safe-to-review") != null')

          echo "is_fork=$IS_FORK" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "has_safe_label=$HAS_SAFE_LABEL" >> "$GITHUB_OUTPUT"

          if [ "$IS_FORK" = "true" ] && [ "$HAS_SAFE_LABEL" != "true" ] && [ "$EVENT_NAME" != "workflow_dispatch" ]; then
            echo "::notice::Skipping automatic review for forked PR #$PR_NUMBER — apply the 'safe-to-review' label to enable."
            echo "skip_review=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_review=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR head
        if: steps.pr-info.outputs.skip_review != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.pr-info.outputs.head_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code Review
        if: steps.pr-info.outputs.skip_review != 'true'
        id: claude-review
        uses: anthropics/claude-code-action@1eddb334cfa79fdb21ecbe2180ca1a016e8e7d47 # v1.0.88
        with:
          # When ``CLAUDE_REVIEW_PAT`` is set, use it so the Claude action's
          # actor-permission check sees a collaborator (with write access)
          # instead of the fork owner (read-only). Falls back to the default
          # ``GITHUB_TOKEN`` for same-repo PRs.
          github_token: ${{ secrets.CLAUDE_REVIEW_PAT || secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr-info.outputs.pr_number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            # Steps to run a Review:
              1) Check if previous review is already done by Claude. If so, perform a re-review with the latest changes referring previous review.
              2) If no previous review is found, perform a new review with the latest changes.

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
